server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${ALLOWED_ORIGINS:http://localhost:4200}"
            allowedMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth routes — public
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # User management — requires JWT + ADMIN
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - JwtAuthenticationFilter

        # Hotels — GET public, write requires JWT
        - id: hotel-service-public
          uri: ${HOTEL_SERVICE_URL:http://hotel-service:8082}
          predicates:
            - Path=/api/hotels/**,/api/rooms/**,/api/amenities/**
            - Method=GET
          filters:
            - StripPrefix=0

        - id: hotel-service-write
          uri: ${HOTEL_SERVICE_URL:http://hotel-service:8082}
          predicates:
            - Path=/api/hotels/**,/api/rooms/**,/api/amenities/**
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - StripPrefix=0
            - JwtAuthenticationFilter

        # Reviews — GET public, write requires JWT
        - id: hotel-service-reviews-public
          uri: ${HOTEL_SERVICE_URL:http://hotel-service:8082}
          predicates:
            - Path=/api/reviews/**
            - Method=GET
          filters:
            - StripPrefix=0

        - id: hotel-service-reviews-write
          uri: ${HOTEL_SERVICE_URL:http://hotel-service:8082}
          predicates:
            - Path=/api/reviews/**
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - StripPrefix=0
            - JwtAuthenticationFilter

        # Bookings — all require JWT
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://booking-service:8083}
          predicates:
            - Path=/api/bookings/**
          filters:
            - StripPrefix=0
            - JwtAuthenticationFilter

        # Actuator
        - id: actuator
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.roombridge: DEBUG
