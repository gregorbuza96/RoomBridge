<div class="login-container">
  <div class="login-card card">
    <h2>Sign In</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" class="form-control"
               [class.is-invalid]="username.invalid && username.touched" />
        <div class="invalid-feedback" *ngIf="username.errors?.['required'] && username.touched">
          Username is required
        </div>
        <div class="invalid-feedback" *ngIf="username.errors?.['minlength'] && username.touched">
          Minimum 3 characters
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control"
               [class.is-invalid]="password.invalid && password.touched" />
        <div class="invalid-feedback" *ngIf="password.errors?.['required'] && password.touched">
          Password is required
        </div>
        <div class="invalid-feedback" *ngIf="password.errors?.['minlength'] && password.touched">
          Minimum 4 characters
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="form.invalid || loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
