<div class="page-header">
  <h2>{{ isEdit ? 'Edit Hotel' : 'Add Hotel' }}</h2>
  <a routerLink="/hotels" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-row">
      <div class="form-group">
        <label>Name *</label>
        <input formControlName="name" [class.is-invalid]="f['name'].invalid && f['name'].touched">
        <div *ngIf="f['name'].errors?.['required'] && f['name'].touched" class="invalid-feedback">Name is required</div>
        <div *ngIf="f['name'].errors?.['maxlength'] && f['name'].touched" class="invalid-feedback">Max 255 characters</div>
      </div>
      <div class="form-group">
        <label>Star Rating (1-5)</label>
        <input type="number" formControlName="starRating" min="1" max="5" [class.is-invalid]="f['starRating'].invalid && f['starRating'].touched">
        <div *ngIf="f['starRating'].invalid && f['starRating'].touched" class="invalid-feedback">Rating must be between 1 and 5</div>
      </div>
    </div>

    <div class="form-group">
      <label>Address *</label>
      <input formControlName="address" [class.is-invalid]="f['address'].invalid && f['address'].touched">
      <div *ngIf="f['address'].errors?.['required'] && f['address'].touched" class="invalid-feedback">Address is required</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>City *</label>
        <input formControlName="city" [class.is-invalid]="f['city'].invalid && f['city'].touched">
        <div *ngIf="f['city'].errors?.['required'] && f['city'].touched" class="invalid-feedback">City is required</div>
      </div>
      <div class="form-group">
        <label>Country *</label>
        <input formControlName="country" [class.is-invalid]="f['country'].invalid && f['country'].touched">
        <div *ngIf="f['country'].errors?.['required'] && f['country'].touched" class="invalid-feedback">Country is required</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input formControlName="phone">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" [class.is-invalid]="f['email'].invalid && f['email'].touched">
        <div *ngIf="f['email'].errors?.['email'] && f['email'].touched" class="invalid-feedback">Invalid email format</div>
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description" rows="3" [class.is-invalid]="f['description'].invalid && f['description'].touched"></textarea>
      <div *ngIf="f['description'].errors?.['maxlength'] && f['description'].touched" class="invalid-feedback">Max 1000 characters</div>
    </div>

    <div style="display:flex;gap:.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Saving...' : (isEdit ? 'Update Hotel' : 'Create Hotel') }}
      </button>
      <a routerLink="/hotels" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
