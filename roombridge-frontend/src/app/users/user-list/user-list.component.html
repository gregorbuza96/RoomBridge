<div class="page-header">
  <h2>Users</h2>
  <a routerLink="/users/new" class="btn btn-primary">+ Add User</a>
</div>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
<div *ngIf="loading" class="loader">Loading...</div>

<div *ngIf="!loading" class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td><strong>{{ user.username }}</strong></td>
        <td>{{ user.email }}</td>
        <td><span class="badge" [ngClass]="roleBadge(user.role)">{{ user.role }}</span></td>
        <td>
          <button class="btn btn-warning btn-sm" (click)="edit(user.id!)">Edit</button>
          <button class="btn btn-danger btn-sm" style="margin-left:.4rem" (click)="delete(user.id!)">Delete</button>
        </td>
      </tr>
      <tr *ngIf="users.length === 0">
        <td colspan="5" style="text-align:center;color:#888;padding:2rem">No users found.</td>
      </tr>
    </tbody>
  </table>
</div>
