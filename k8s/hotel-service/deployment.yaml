apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-service
  namespace: roombridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-service
  template:
    metadata:
      labels:
        app: hotel-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: hotel-service
          image: YOUR_ECR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/hotel-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server:8888
            - name: DB_HOST
              value: db-hotels
            - name: DB_USER
              value: roombridge
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roombridge-secrets
                  key: db-password
            - name: REDIS_HOST
              value: redis
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: roombridge-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
  namespace: roombridge
spec:
  selector:
    app: hotel-service
  ports:
    - port: 8082
      targetPort: 8082
