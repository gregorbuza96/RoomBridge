apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: roombridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api-gateway
          image: YOUR_ECR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server:8888
            - name: USER_SERVICE_URL
              value: http://user-service:8081
            - name: HOTEL_SERVICE_URL
              value: http://hotel-service:8082
            - name: BOOKING_SERVICE_URL
              value: http://booking-service:8083
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: roombridge-secrets
                  key: jwt-secret
            - name: ALLOWED_ORIGINS
              value: "https://roombridge.yourdomain.com"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: roombridge
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
