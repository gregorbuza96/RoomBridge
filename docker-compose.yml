version: '3.9'

services:
  # ── Databases ──────────────────────────────────────────
  db-users:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roombridge_users
      POSTGRES_USER: roombridge
      POSTGRES_PASSWORD: roombridge123
    ports:
      - "5433:5432"
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roombridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-hotels:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roombridge_hotels
      POSTGRES_USER: roombridge
      POSTGRES_PASSWORD: roombridge123
    ports:
      - "5434:5432"
    volumes:
      - pgdata-hotels:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roombridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-bookings:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roombridge_bookings
      POSTGRES_USER: roombridge
      POSTGRES_PASSWORD: roombridge123
    ports:
      - "5435:5432"
    volumes:
      - pgdata-bookings:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roombridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Infrastructure ─────────────────────────────────────
  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      USER_SERVICE_URL: http://user-service:8081
      HOTEL_SERVICE_URL: http://hotel-service:8082
      BOOKING_SERVICE_URL: http://booking-service:8083
      ALLOWED_ORIGINS: http://localhost:4200
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      config-server:
        condition: service_healthy

  # ── Microservices ──────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: db-users
      DB_USER: roombridge
      DB_PASSWORD: roombridge123
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      config-server:
        condition: service_healthy
      db-users:
        condition: service_healthy

  hotel-service:
    build: ./hotel-service
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: db-hotels
      DB_USER: roombridge
      DB_PASSWORD: roombridge123
      REDIS_HOST: redis
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      config-server:
        condition: service_healthy
      db-hotels:
        condition: service_healthy
      redis:
        condition: service_healthy

  booking-service:
    build: ./booking-service
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: db-bookings
      DB_USER: roombridge
      DB_PASSWORD: roombridge123
      HOTEL_SERVICE_URL: http://hotel-service:8082
      USER_SERVICE_URL: http://user-service:8081
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      config-server:
        condition: service_healthy
      db-bookings:
        condition: service_healthy
      hotel-service:
        condition: service_started

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build: ./roombridge-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

  # ── Monitoring ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata-users:
  pgdata-hotels:
  pgdata-bookings:
  grafana-data:
